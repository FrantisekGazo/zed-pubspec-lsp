# Custom language scoped to pubspec files only. Zed selects the language with
# the longest matching path suffix, so "pubspec.yaml" wins over the builtin
# YAML language's "yaml" suffix (zed-industries/zed#29716) and the language
# server below starts only for these files.
name = "Pubspec"
grammar = "yaml"
path_suffixes = ["pubspec.yaml", "pubspec_overrides.yaml"]
line_comments = ["# "]
autoclose_before = ",]}"
brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
    { start = "'", end = "'", close = true, newline = false, not_in = ["string"] },
]

auto_indent_on_paste = false
auto_indent_using_last_non_empty_line = false
# Same as Zed's builtin YAML config:
# 1st block to match basic elements followed by ':' like 'test: ' for example
# 2nd block to match for first element in an array if it's an object
increase_indent_pattern = "(:?^[^#]*:\\s*[|>]?\\s*$)|(:?^\\s*-[^#]*:\\s*(:?#+.*)$)"
prettier_parser_name = "yaml"
tab_size = 2
