# Builds the language-server binary for every supported platform and attaches
# the archives to the GitHub release for the pushed tag. The archive names form
# a contract with the extension's download code in src/lib.rs:
#   pubspec-language-server-<target>.tar.gz  (unix)
#   pubspec-language-server-<target>.zip     (windows)
#
# Both macOS targets build on the arm64 macos-14 runner (x86_64 cross-compiles
# cleanly there via `rustup target add`, and macos-14 capacity is plentiful
# unlike the scarce Intel macos-13 pool). The Linux musl targets build via
# `cross` on an x86_64 runner — that is cross's designed use case and it
# handles aarch64-musl in its container; it does NOT run on an arm64 runner.
# upload-rust-binary-action creates the release on first upload, so there is no
# separate create-release job.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# A re-pushed tag supersedes the previous build; cancel the older run.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upload-assets:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: pubspec-language-server
          # The workspace root is the WASM extension package (no binaries); the
          # server bin lives in this member, so cargo must be pointed at it or
          # `--bin` resolves against the root package and finds nothing.
          manifest_path: server/Cargo.toml
          target: ${{ matrix.target }}
          archive: $bin-$target
          token: ${{ secrets.GITHUB_TOKEN }}
